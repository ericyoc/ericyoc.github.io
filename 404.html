<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Eric Yocam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #0f2340; --gold: #c8983a; --light: #f4f6f9; --muted: #6b7a8d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 6rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: .8rem 0 1rem; }
    p { color: var(--muted); font-size: .95rem; line-height: 1.7; margin-bottom: 2rem; }
    a.btn {
      display: inline-block;
      background: var(--navy);
      color: #fff;
      text-decoration: none;
      padding: .65rem 1.8rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: .9rem;
      letter-spacing: .04em;
      transition: background .2s;
    }
    a.btn:hover { background: var(--gold); color: var(--navy); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Head back to the homepage to find what you need.</p>
    <a class="btn" href="/">← Back to Home</a>
  </div>
</body>
</html>
