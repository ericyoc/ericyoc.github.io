<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Eric Yocam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    :root {
      --navy: #0f2340;
      --gold: #c8983a;
      --light: #f4f6f9;
      --muted: #6b7a8d;
      --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
      margin-bottom: .5rem;
    }
    .code span { color: var(--gold); }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: .75rem;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      padding: .7rem 2rem;
      border-radius: 6px;
      transition: background .2s;
    }
    .btn:hover { background: #b8882a; }
  </style>
</head>
<body>
  <div class="code">4<span>0</span>4</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have moved. Head back to the homepage to find what you need.</p>
  <a href="https://ericyocam.com" class="btn">← Back to ericyocam.com</a>
</body>
</html>
